name: Plataforma CI

# Solo corre para cambios del subdirectorio de la plataforma de membresías
# (el repo también aloja la campaña; no interferimos con ella).
on:
  push:
    paths: ["plataforma/**"]
  pull_request:
    paths: ["plataforma/**"]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plataforma
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: plataforma/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
        env:
          # placeholders: las páginas son force-dynamic; el build no cobra ni conecta.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
