name: Tony AI Frontend Tests

# CI checks (TypeScript + lint) en cada PR/push.
# No requiere secrets — solo valida que el código compile.

on:
  push:
    branches: [main, dev]
    paths:
      - 'tony-app/frontend/**'
  pull_request:
    branches: [main]
    paths:
      - 'tony-app/frontend/**'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tony-app/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: tony-app/frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build smoke test
        run: npm run build
        env:
          AUTH_SECRET: dummy-ci-secret-not-used
          TONY_USERNAME: ci
          TONY_PASSWORD: ci-password
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8765
