name: Deploy Tony AI to Vercel

# Deploy frontend Next.js a Vercel cuando hay push a main.
# Pre-requisito: GitHub Secrets:
#   VERCEL_TOKEN          → vercel.com/account/tokens
#   VERCEL_ORG_ID         → vercel.com/<team>/settings (org ID)
#   VERCEL_PROJECT_ID     → vercel.com/<team>/<project>/settings (project ID)
#
# Workflow:
#   1. Checkout
#   2. Setup Node 20
#   3. Install Vercel CLI
#   4. Pull env vars de Vercel
#   5. Build
#   6. Deploy --prod

on:
  push:
    branches: [main]
    paths:
      - 'tony-app/frontend/**'
      - '.github/workflows/deploy-vercel.yml'
  workflow_dispatch:  # manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tony-app/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: tony-app/frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "Deployed to: $DEPLOY_URL"
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Notify Telegram
        if: always()
        env:
          STATUS: ${{ job.status }}
          DEPLOY_URL: ${{ env.DEPLOY_URL }}
          COMMIT: ${{ github.event.head_commit.message }}
          AUTHOR: ${{ github.event.head_commit.author.name }}
        run: |
          if [ "$STATUS" = "success" ]; then
            EMOJI="🚀"
            TEXT="*Deploy Tony AI · OK*\n\n👤 ${AUTHOR}\n📝 ${COMMIT:0:200}\n🔗 ${DEPLOY_URL}"
          else
            EMOJI="⚠"
            TEXT="*Deploy Tony AI · FALLO*\n\n👤 ${AUTHOR}\n📝 ${COMMIT:0:200}\nstatus: ${STATUS}"
          fi
          # Optional: send to Tony alert webhook (only if TONY_ALERT_WEBHOOK secret exists)
          if [ -n "${{ secrets.TONY_ALERT_WEBHOOK }}" ]; then
            curl -X POST "${{ secrets.TONY_ALERT_WEBHOOK }}" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"${EMOJI} ${TEXT}\",\"level\":\"info\"}"
          fi
