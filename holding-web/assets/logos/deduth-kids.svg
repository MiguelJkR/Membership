<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" aria-label="DEDUTH ACADEMY KIDS">
  <!-- D coral con outline navy -->
  <path d="M 45 30
           L 100 30
           Q 160 30 160 100
           Q 160 170 100 170
           L 45 170 Z"
        fill="#E55B47" stroke="#1F2D5C" stroke-width="6" stroke-linejoin="round"/>
  <!-- Moneda amarilla con cara feliz -->
  <circle cx="105" cy="100" r="38" fill="#F2C641" stroke="#1F2D5C" stroke-width="4"/>
  <!-- Borde acuñado de moneda (lateral izquierdo, sugerencia 3D) -->
  <path d="M 75 78 L 73 90 L 73 110 L 75 122"
        stroke="#1F2D5C" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <!-- Ojos felices (arcos cerrados) -->
  <path d="M 90 92 Q 95 86 100 92" stroke="#1F2D5C" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M 112 92 Q 117 86 122 92" stroke="#1F2D5C" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <!-- Sonrisa abierta -->
  <path d="M 92 108 Q 105 122 118 108 Q 110 118 100 118 Q 95 118 92 108 Z"
        fill="#E55B47" stroke="#1F2D5C" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Lengua rosa -->
  <ellipse cx="105" cy="115" rx="6" ry="3" fill="#F8A9A0"/>
</svg>
